name: Web bug report
description: Report broken behavior in the profile site, blog, routing, styling, or publishing.
title: 'fix: '
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken, confusing, or not working as expected?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add links, screenshots, commands, logs, or affected pages if useful.
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this fix be checked?
