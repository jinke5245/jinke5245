name: Repository maintenance
description: Improve setup, GitHub templates, workflows, agent config, or tooling.
title: 'chore: '
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Project initialization
        - GitHub templates
        - GitHub Actions
        - Agent configuration
        - Development tooling
        - Repository structure
        - Other
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be improved, clarified, or set up?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List expected files, behaviors, or boundaries.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List expected checks, commands, or review steps.
